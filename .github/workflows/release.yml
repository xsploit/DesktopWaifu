name: Build & Release

on:
  # push:
  #   tags:
  #     - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Build per platform
  # ─────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_label: Linux-x64
          - os: windows-latest
            platform: win
            arch: x64
            artifact_label: Windows-x64
          - os: macos-latest
            platform: mac
            arch: arm64
            artifact_label: macOS-arm64

    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web assets
        run: bun run build:web

      # Use the electrobun CLI installed from npm (not the local dev path)
      - name: Build Electrobun app (stable)
        run: bunx electrobun build --env=stable

      # On Linux, download the AppImageTool binary into the workspace root.
      - name: Acquire AppImageTool
        if: matrix.platform == 'linux'
        run: |
          URL="https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          curl -L -o appimagetool "${URL}"
          chmod +x appimagetool
          # we will invoke this binary directly later; no PATH changes required
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool --version || true

      # Windows only: write manifests and run postPackage fix
      - name: Write Windows manifests
        if: matrix.platform == 'win'
        run: bun run scripts/write-windows-manifests.mjs

      - name: Run postPackage fix (Windows)
        if: matrix.platform == 'win'
        run: bun run scripts/fix-windows-setup-extractor.mjs
        env:
          # Points to the extractor bundled with the installed electrobun npm package.
          # The script falls back to this when the local dev path is unavailable.
          # Update this path if the electrobun package structure changes.
          ELECTROBUN_EXTRACTOR_PATH: ${{ github.workspace }}/node_modules/electrobun/bin/extractor.exe

      # ── Collect Linux artifacts ──────────────────────────────────────────
      # After the Electrobun build we can try to produce an AppImage.  
      # appimagetool is installed earlier on linux runners.

      # Electrobun's build uses GNU tar by default, which emits @LongLink (type
      # 'L') entries for paths longer than 100 chars.  Zig's tar extractor inside
      # the self-extractor binary does not support GNU @LongLink, causing
      # "TarUnsupportedFileType" at runtime.  Repack the archive in PAX format
      # (which Zig *does* support) before embedding it in the launcher.
      - name: Repack app archive as PAX tar
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -eux
          APP="webwaifu3-electrobun"
          RESOURCES="build/stable-linux-x64/$APP/Resources"
          ARCHIVE=$(find "$RESOURCES" -maxdepth 1 -name "*.tar.zst" | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "No *.tar.zst found – skipping repack"
            exit 0
          fi
          echo "Repacking $ARCHIVE from GNU to PAX format..."
          TMPDIR_REPACK=$(mktemp -d)
          # extract
          zstd -d -c "$ARCHIVE" | tar -x -C "$TMPDIR_REPACK"
          # repack as PAX (POSIX.1-2001), compress with zstd
          tar --format=pax -c -C "$TMPDIR_REPACK" . | zstd -T0 -19 -o "${ARCHIVE}.pax.zst"
          mv "${ARCHIVE}.pax.zst" "$ARCHIVE"
          rm -rf "$TMPDIR_REPACK"
          echo "Repacked: $(stat -c%s "$ARCHIVE") bytes"

      - name: Create AppImage
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -eux
          # expect the binary in workspace root (downloaded earlier)
          if [ ! -x ./appimagetool ]; then
            echo "appimagetool binary missing; run Acquire step or store locally"
            exit 1
          fi
          TOOL="./appimagetool"
          APP="webwaifu3-electrobun"
          BUILD_DIR="build/stable-linux-x64/$APP"
          mkdir -p dist-release
          echo "Listing contents of $BUILD_DIR for inspection:"
          ls -R "$BUILD_DIR" | head -n 20 || true
          if [ -d "$BUILD_DIR" ]; then
            # the .desktop file produced by electrobun sets Icon=appIcon.png
            # AppImageTool expects the icon name to be extensionless, so rewrite it.
            if [ -f "$BUILD_DIR/webwaifu3-electrobun.desktop" ]; then
              sed -i 's/^Icon=\(.*\)\.png$/Icon=\1/' "$BUILD_DIR/webwaifu3-electrobun.desktop"
            fi
            # also ensure there is a matching icon file at the root of the AppDir
            if [ -f "$BUILD_DIR/Resources/appIcon.png" ]; then
              cp "$BUILD_DIR/Resources/appIcon.png" "$BUILD_DIR/appIcon.png"
            fi

            # Unpack the compressed application archive so the AppDir contains
            # the actual binaries (bun, libs, etc).  The stable build keeps these
            # files inside a tarball for the installer, but the portable AppImage
            # needs them laid out flat.
            ARCHIVE=$(find "$BUILD_DIR/Resources" -maxdepth 1 -name "*.tar.zst" | head -1)
            if [ -n "$ARCHIVE" ]; then
              echo "Extracting app archive into AppDir from $ARCHIVE"
              tar --strip-components=1 -x -I zstd -f "$ARCHIVE" -C "$BUILD_DIR"
            fi

            # Override the default Qt‑based runtime by shipping a tiny
            # shell wrapper as AppRun.  The stock runtime spawns Qt and
            # prints the "Could not find the Qt platform plugin" message
            # on Wayland, which confuses end users even though the
            # bundled GTK launcher is perfectly functional.  Our script
            # simply execs the Electrobun launcher directly and also
            # forces the X11 backend when running under Wayland.
            cat > "$BUILD_DIR/AppRun" <<'EOF'
#!/bin/sh
# simple entrypoint used by the AppImage
# force X11 on Wayland so the GTK shell is transparent and Qt
# (if it gets loaded) doesn't try to use a missing wayland plugin.
if [ "$XDG_SESSION_TYPE" = "wayland" ]; then
    export GDK_BACKEND=x11
    export QT_QPA_PLATFORM=xcb
fi

# locate ourselves; AppImage sets APPDIR automatically when mounted
if [ -z "$APPDIR" ]; then
    # fallback for manual testing from build directory
    APPDIR="$(dirname "$0")"
fi
exec "$APPDIR/bin/launcher" "$@"
EOF
            chmod +x "$BUILD_DIR/AppRun"

            # ── Prepare portable runtime launcher ─────────────────────────
            # Instead of shipping the self‑extractor installer we want a
            # ready‑to‑run bundle.  Copy the normal Electrobun launcher from the
            # installed npm package; it will start the Bun server from
            # Resources/app without touching the user's home directory.
            RUNTIME_LAUNCHER="node_modules/electrobun/dist-linux-x64/launcher"
            if [ ! -f "$RUNTIME_LAUNCHER" ]; then
              echo "ERROR: runtime launcher missing: $RUNTIME_LAUNCHER"
              exit 1
            fi
            cp "$RUNTIME_LAUNCHER" "$BUILD_DIR/bin/launcher"
            chmod +x "$BUILD_DIR/bin/launcher"
            echo "Using portable launcher $(stat -c%s "$BUILD_DIR/bin/launcher") bytes"
            # ── end payload embedding ────────────────────────────────────────

            echo "Generating AppImage from $BUILD_DIR"
            APPIMAGE_EXTRACT_AND_RUN=1 $TOOL "$BUILD_DIR" "dist-release/DesktopWaifu-Linux-x64.AppImage"
            echo "AppImage creation exit code: $?"
            ls -lh dist-release || true
          else
            echo "Warning: build directory $BUILD_DIR not found, skipping AppImage generation"
          fi

      - name: Collect Linux artifacts
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p dist-release
          APP="webwaifu3-electrobun"
          BUILD_DIR="build/stable-linux-x64"

          # Compressed tar.gz of the entire app directory
          if [ -d "$BUILD_DIR/$APP" ]; then
            tar -czf "dist-release/DesktopWaifu-Linux-x64.tar.gz" \
              -C "$BUILD_DIR" "$APP"
            echo "Created DesktopWaifu-Linux-x64.tar.gz"
          else
            echo "WARNING: $BUILD_DIR/$APP not found, searching..."
            find build/stable-linux-* -maxdepth 1 -type d | head -5
          fi

          # AppImage if generated
          find . -name "*.AppImage" -not -path "*/node_modules/*" \
            -exec cp {} dist-release/DesktopWaifu-Linux-x64.AppImage \; 2>/dev/null || true

      # ── Collect Windows artifacts ────────────────────────────────────────
      - name: Collect Windows artifacts
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          $APP = "webwaifu3-electrobun"
          $patterns = @(
            "build\stable-win-x64\*-Setup.exe",
            "build\stable-win-x64\*-Setup.zip",
            "artifacts\*-Setup.exe",
            "artifacts\*-Setup.zip",
            "build\**\*-Setup.exe",
            "build\**\*-Setup.zip"
          )
          foreach ($pattern in $patterns) {
            $files = Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
            foreach ($file in $files) {
              if ($file.Extension -eq ".exe") {
                Copy-Item $file.FullName "dist-release\DesktopWaifu-Setup.exe" -Force
                Write-Host "Copied $($file.Name) -> DesktopWaifu-Setup.exe"
              } elseif ($file.Extension -eq ".zip") {
                Copy-Item $file.FullName "dist-release\DesktopWaifu-Setup.zip" -Force
                Write-Host "Copied $($file.Name) -> DesktopWaifu-Setup.zip"
              }
            }
          }
          Get-ChildItem dist-release

      # ── Collect macOS artifacts ──────────────────────────────────────────
      - name: Collect macOS artifacts
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          mkdir -p dist-release
          APP="webwaifu3-electrobun"
          BUILD_DIR="build/stable-mac-arm64"

          # DMG if generated
          find . -name "*.dmg" -not -path "*/node_modules/*" \
            -exec cp {} dist-release/DesktopWaifu-macOS-arm64.dmg \; 2>/dev/null || true

          # ZIP the app bundle if no DMG was generated
          if [ ! -f dist-release/DesktopWaifu-macOS-arm64.dmg ]; then
            if [ -d "$BUILD_DIR/$APP" ]; then
              zip -r "dist-release/DesktopWaifu-macOS-arm64.zip" \
                "$BUILD_DIR/$APP"
              echo "Created DesktopWaifu-macOS-arm64.zip"
            else
              echo "WARNING: $BUILD_DIR/$APP not found, searching..."
              find build/stable-mac-* -maxdepth 1 -type d | head -5
            fi
          fi

      - name: List artifacts
        shell: bash
        run: ls -lh dist-release/ || echo "dist-release is empty or missing"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist-release/
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Create the GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh release-artifacts/

      - name: Generate SHA256 checksums
        working-directory: release-artifacts
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "DesktopWaifu ${{ steps.version.outputs.tag }}"
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          body: |
            Release ${{ steps.version.outputs.tag }} of DesktopWaifu, built with Electrobun.
          files: |
            release-artifacts/*
