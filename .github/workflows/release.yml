name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build and release (for example v0.0.2)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
          - os: ubuntu-latest
            label: Linux x64
          - os: macos-latest
            label: macOS

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.value }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build stable release
        run: bun run build:stable

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          winget install --id JRSoftware.InnoSetup --accept-package-agreements --accept-source-agreements --silent

      - name: Build Windows GUI installer
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:DESKTOPWAIFU_VERSION='${{ steps.release_tag.outputs.value }}'
          bun run scripts/build-windows-installer.mjs

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          if-no-files-found: error
          path: |
            artifacts/**
            build/stable-win-x64/DesktopWaifu-Setup.exe
            build/stable-linux-x64/*.AppImage
            build/stable-linux-x64/*.tar.*
            build/stable-mac*/*.dmg
            build/stable-mac*/*.zip

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: ${{ steps.release_tag.outputs.value }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/**/*
